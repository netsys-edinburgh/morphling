[network]
listen_ip = 0.0.0.0
listen_port = 39000


[log]
log_level = debug
log_type = terminal


[worker]
thread = 56
block_size = 256
num_device = 3
max_inflight = 100
transport_mode = emulator


[internal]
cleanup_wait = 60
tcp_timeout = 5
enable_cli_cache = 1
send_high_water_mark = 4194304
max_batch_per_device = 50
partitions_per_device = 4


[scalability]
# 0 = barrier (wait for N devices), 1 = dynamic (elastic join/leave)
device_mode = 0
# 0 = use num_device from [worker]; >0 = explicit barrier count
barrier_count = 0
# Barrier timeout in ms; 0 = infinite
barrier_timeout = 0
# Max queued dispatch requests in dynamic mode
max_queue_size = 1024
