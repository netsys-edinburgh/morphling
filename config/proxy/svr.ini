[network]
listen_ip = 0.0.0.0
listen_port = 39000


[log]
log_level = debug
log_type = terminal


[worker]
thread = 56
block_size = 256
num_device = 3
max_inflight = 100


[internal]
cleanup_wait = 60
tcp_timeout = 5
enable_cli_cache = 1
send_high_water_mark = 4194304
max_batch_per_device = 50
partitions_per_device = 4


[scalability]
# 0 = barrier (wait for N devices), 1 = dynamic (elastic join/leave)
device_mode = 0
# 0 = use num_device from [worker]; >0 = explicit barrier count
barrier_count = 0
# Barrier timeout in ms; 0 = infinite
barrier_timeout = 0
# Max queued dispatch requests in dynamic mode
max_queue_size = 1024


# Server-measured device profile (#55, optional).
#
# Each enable_* gate runs a probe AFTER device registration and BEFORE the
# device becomes scheduler-eligible. Defaults are all off; in that case the
# server behavior is identical to pre-#55 (register -> SendIdlePartitions).
#
# Precedence (per knob): this INI value > MORPHLING_MEASURE_* env var >
# the default shown below.
#
# Probes:
#   M1 latency  : RTT echo of latency_payload_bytes; one-way == RTT/2.
#   M2 bandwidth: RTT echo of bandwidth_payload_bytes; bps reported for
#                 both ul/dl (RTT echo measures min(ul,dl)).
#   M3 FLOPS    : seeded float32 GEMM challenge; server recomputes C with
#                 OpenBLAS and verifies device-returned C within
#                 flops_tolerance (atol + rtol * |ref|).
[device_measurement]
enable_latency = 0
enable_bandwidth = 0
enable_flops = 0
latency_payload_bytes = 64
bandwidth_payload_bytes = 4194304
flops_matrix_dim = 256
probe_timeout_sec = 5.0
flops_tolerance = 1e-3
