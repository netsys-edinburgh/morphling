syntax = "proto3";
import "worker.proto";

option java_multiple_files = true;
option java_package = "com.example.confidant.rpc.api";
option java_outer_classname = "TrainCentralProto";
option objc_class_prefix = "TrainCentral";

package traincentral;

service CentralGreeter {
    rpc SendTensorTest (trainworker.SendTensorTestRequest) returns (trainworker.CommonResponse) {}
    rpc SendTrainBackward(trainworker.SendTrainBackwardRequest) returns(trainworker.CommonResponse) {}
}

