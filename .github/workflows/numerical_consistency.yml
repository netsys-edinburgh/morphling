name: Python Smoke Tests (CPU)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpu-smoke:
    name: smoke-tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install test dependencies
        run: pip install pytest pytest-timeout torch numpy
      - name: Run CPU smoke tests
        # Discovery is marker-driven. Any test marked @pytest.mark.smoke
        # (function or module-level pytestmark) is picked up automatically.
        # The --ignore list covers paths that either need GPU / the morphling
        # C extension, or import heavy deps (pandas, psutil, tqdm) at module
        # scope — pytest imports every module during collection before it can
        # read markers, so an unsatisfied import aborts the run even when the
        # file would be deselected.
        run: >-
          pytest tests/python
          -m smoke
          --ignore=tests/python/unit/hooks
          --ignore=tests/python/unit/morphling
          --ignore=tests/python/unit/test_c_extension_bindings.py
          --ignore=tests/python/unit/test_loaded_lib.py
          --ignore=tests/python/unit/test_pytorch_train.py
          --ignore=tests/python/unit/test_param_offload.py
          --ignore=tests/python/unit/test_gemm_shape_logging.py
          --ignore=tests/python/unit/test_checkpoint_multifile_smoke.py
          --ignore=tests/python/unit/test_rs_code.py
          --ignore=tests/python/unit/test_ldpc_adapter.py
          --ignore=tests/python/unit/test_matrix_sum.py
          --ignore=tests/python/unit/test_pytorch_mempool.py
          --ignore=tests/python/unit/test_tenseal.py
          --ignore=tests/python/unit/test_torch_cpu.py
          --ignore=tests/python/integration/test_greenctx_training.py
          --timeout=120 -v --tb=short

  cpu-entrypoint:
    name: CLI entrypoint tests (CPU)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install test dependencies
        # Entrypoint tests stub out torch / morphling._C / huggingface_hub
        # via monkeypatch, but the repo-root conftest.py registers
        # tests.python.testutils.determinism as a global pytest plugin, which
        # imports numpy + torch at module scope. Those must be present for
        # collection to succeed even though the entrypoint tests don't use
        # them directly.
        run: pip install pytest pytest-timeout numpy torch
      - name: Run entrypoint tests
        run: >-
          pytest tests/python/unit/entrypoint
          --timeout=60 -v --tb=short
