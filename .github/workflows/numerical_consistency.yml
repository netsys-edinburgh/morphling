name: Numerical Consistency Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install test dependencies
        run: pip install pytest pytest-timeout torch numpy
      - name: Run smoke tests
        # Scope to only numerical-consistency test files to avoid collection
        # errors from pre-existing tests that require uninstalled dependencies
        # (transformers, pandas, psutil, morphling C extensions, etc.).
        run: >-
          pytest
          tests/python/unit/test_axis1_emulated_vs_real.py
          tests/python/unit/test_axis2_dispatch_correctness.py
          tests/python/unit/test_axis3_determinism.py
          tests/python/unit/test_determinism_utils.py
          tests/python/unit/test_numerical_utils.py
          tests/python/unit/test_golden_generation.py
          tests/python/unit/test_deep_verification_script.py
          tests/python/integration/test_convergence_regression.py
          -m smoke --timeout=120 -v --tb=short
