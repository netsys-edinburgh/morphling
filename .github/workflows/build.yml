name: Docker Build

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'CITATION.cff'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/CODEOWNERS'
  pull_request:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'CITATION.cff'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/CODEOWNERS'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Docker image builds
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          submodules: recursive

      # The PyTorch CUDA-devel base image is ~10 GB; default GitHub-hosted
      # runners ship with ~14 GB free. Free up space to avoid ENOSPC during
      # the install step.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GitHub-hosted runners are CPU-only. The image build does not require
      # a GPU (nvcc compiles offline, the morphling C extensions only need
      # CUDA_HOME + nvcc to be present). GPU-dependent tests are not run in
      # this job — they would require a self-hosted GPU runner.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: device-emulator:ci
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke check — image imports the package
        run: |
          docker run --rm device-emulator:ci python3 -c "import morphling; print('morphling import OK')"
