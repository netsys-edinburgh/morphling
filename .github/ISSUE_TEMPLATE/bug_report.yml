name: Bug Report
description: File an issue about a bug in Morphling (DeviceEmulator).
title: "[BUG] "
labels: [bug]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Please provide as much detail as possible to help us address the issue
        efficiently. If you're unsure whether this is a bug, consider opening
        a discussion first.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched the [issue tracker](https://github.com/drunkcoding/DeviceEmulator/issues) to ensure this hasn't been reported.
          required: true
        - label: I have checked the [troubleshooting guide](../docs/troubleshooting.md) (if applicable).
          required: false

  - type: textarea
    id: system-info
    attributes:
      label: System Information
      description: |
        Please provide the following:
          - OS and version (e.g., Ubuntu 22.04)
          - GPU model (e.g., NVIDIA L40S, RTX 4090)
          - CUDA toolkit version (`nvcc --version`)
          - NVIDIA driver version (`nvidia-smi`)
          - Docker version (`docker --version`)
          - Python version
          - Git commit hash (`git rev-parse HEAD`)
          - Docker image ID (`docker images device-emulator`)
      render: shell
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Problem Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide the exact commands and code that reproduce the issue.
      value: |
        Commands:
        ```bash

        ```

        Steps:
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead? Include error messages, stack traces, log output.
      render: shell

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Anything else relevant — screenshots, suggested fixes, related issues.
