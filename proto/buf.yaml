version: v1
name: buf.build/morphling/proto
breaking:
  use:
    - FILE
  ignore_unstable_packages: true
deps: []
lint:
  use:
    - DEFAULT
  except:
    - PACKAGE_VERSION_SUFFIX
    - FIELD_LOWER_SNAKE_CASE
    - PACKAGE_DIRECTORY_MATCH
    - DIRECTORY_SAME_PACKAGE
    - ENUM_FIRST_VALUE_ZERO
    - ENUM_VALUE_PREFIX
