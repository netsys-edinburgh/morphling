syntax = "proto3";

package morphling;

message Empty {}

service MemoryManager {
    rpc ScheduleGemmSync (ScheduleGemmRequest) returns (ScheduleGemmResponse) {}
    rpc GetModelParam (ModelParamRequest) returns (ModelParamResponse) {}
}

message Response {
    string message = 1;
    uint32 code = 2;
}

message ShmInfo {
    string name = 1;
    uint64 size = 2;
}

message ScheduleGemmRequest {
    string task_id = 1;
    uint32 device_id = 2;
    uint32 sync_stage = 3;
    repeated ShmInfo a_info = 10;
    repeated ShmInfo b_info = 11;
    repeated ShmInfo c_info = 12;
    ShmInfo task_info = 13;
}

message ScheduleGemmResponse {
    Response rsp = 1;
    uint64 virtual_ts = 10;
}

message ModelParamRequest {
}

message ParamInfo {
    string param_name = 1;
    string shm_name = 2;
    uint64 size = 3;
}

message ModelParamResponse {
    Response rsp = 1;
    repeated ParamInfo param_info = 2;
}


// Messages used in MQ

message MatMulRequestMessage {
    uint32 row = 1;
    uint32 col = 2;
    repeated uint32 ld = 3;
    repeated bytes mat = 10;
}

message MatMulResponseMessage {
    uint32 row = 1;
    uint32 col = 2;
    repeated uint32 ld = 3;
    bytes mat = 10;
}

