syntax = "proto3";

package morphling;

service MemoryManager {
    rpc ScheduleGemmSync (ScheduleGemmRequest) returns (ScheduleGemmResponse) {}
    rpc GetModelParam (ModelParamRequest) returns (ModelParamResponse) {}
}

message Response {
    string message = 1;
    uint32 code = 2;
}

message ShmInfo {
    string name = 1;
    uint64t size = 2;
}

message ScheduleGemmRequest {
    string task_id = 1;
    repeated ShmInfo a_info = 2;
    repeated ShmInfo b_info = 3;
    repeated ShmInfo c_info = 4;
    ShmInfo task_info = 5;
}

message ScheduleGemmResponse {
    Response response = 1;
}

message ModelParamRequest {
}

message ParamInfo {
    string param_name = 1;
    string shm_name = 2;
    uint64t size = 2;
}

message ModelParamResponse {
    Response response = 1;
    repeated ParamInfo param_info = 2;
}
