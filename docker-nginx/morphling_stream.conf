# nginx stream (L4 TCP) proxy for the Morphling backend.
#
# Mounted by docs/deployment.md "Physical device deployment" into
# /etc/nginx/stream_conf.d/morphling_stream.conf and pulled in by the
# `include /etc/nginx/stream_conf.d/*.conf;` directive in nginx.conf.
#
# Terminates inbound TCP on :443 and forwards to the local Morphling
# proxy server listening on :39000 (the port run_devices.py binds).
stream {
    upstream morphling_backend {
        server 127.0.0.1:39000;
    }

    server {
        listen 0.0.0.0:443;
        proxy_pass morphling_backend;
    }
}
