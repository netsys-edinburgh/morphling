worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

# Stream (L4 TCP) proxy config is supplied separately and mounted into
# /etc/nginx/stream_conf.d/ — see docs/deployment.md "Physical device
# deployment". Keep the stream block out of this file so the two mounts
# compose instead of declaring `stream {}` twice (nginx rejects a
# duplicate top-level stream block).
include /etc/nginx/stream_conf.d/*.conf;

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    include       /etc/nginx/conf.d/*.conf;
}
