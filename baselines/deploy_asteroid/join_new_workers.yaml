---
# ============================================================================
# Join New Worker Nodes to Existing K3s Cluster
# ============================================================================
# Installs K3s agent on new nodes and joins them to the cluster.
# The K3s server is at worker2_node (10.203.54.10), NOT the inventory [master].
# Auth is handled via vault secrets (ansible_ssh_pass / ansible_become_pass).
#
# Prerequisites:
#   1. New nodes added to [workers] in inventory.ini
#   2. Nodes reachable over SSH (password auth via secrets.yml)
#
# Usage (called automatically by deploy_asteroid.sh --phase k3s or join-nodes):
#   ansible-playbook -i inventory.ini join_new_workers.yaml \
#     -e @secrets.yml --vault-password-file .vault_pass \
#     --limit edinburgh_node,leeds_node -v
# ============================================================================

- name: Get K3s join token from actual server
  hosts: worker2_node
  become: true
  vars_files:
    - secrets.yml
  tasks:
    - name: Read K3s server token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token

    - name: Set token and server IP facts
      set_fact:
        k3s_node_token: "{{ k3s_token.content | b64decode | trim }}"
        k3s_server_ip: "{{ ansible_host }}"

    - name: Display server info
      debug:
        msg: "K3s server: {{ k3s_server_ip }}, token: {{ k3s_node_token[:20] }}..."

- name: Install K3s agent on new worker nodes
  hosts: workers
  become: true
  serial: 1
  vars_files:
    - secrets.yml
  tasks:
    - name: Get server info from k3s server node
      set_fact:
        k3s_server_ip: "{{ hostvars['worker2_node']['k3s_server_ip'] }}"
        k3s_node_token: "{{ hostvars['worker2_node']['k3s_node_token'] }}"

    - name: Check if k3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_installed

    - name: Skip already-installed nodes
      debug:
        msg: "K3s already installed on {{ inventory_hostname }}, skipping"
      when: k3s_installed.stat.exists

    - name: Install curl if missing
      apt:
        name: curl
        state: present
        update_cache: yes
      when: not k3s_installed.stat.exists

    - name: Install k3s agent
      shell: |
        curl -sfL https://get.k3s.io | \
          K3S_URL=https://{{ k3s_server_ip }}:6443 \
          K3S_TOKEN={{ k3s_node_token }} \
          sh -
      args:
        creates: /usr/local/bin/k3s
      when: not k3s_installed.stat.exists

    - name: Wait for k3s-agent to start
      systemd:
        name: k3s-agent
        state: started
        enabled: true
      when: not k3s_installed.stat.exists

    - name: Verify agent is running
      command: systemctl is-active k3s-agent
      register: agent_status
      changed_when: false
      failed_when: false

    - name: Report status
      debug:
        msg: "{{ inventory_hostname }} ({{ ansible_host }}): k3s-agent {{ agent_status.stdout }}"

- name: Verify cluster membership
  hosts: localhost
  become: false
  tasks:
    - name: Check all nodes joined
      command: kubectl get nodes -o wide
      register: kubectl_nodes
      changed_when: false

    - name: Display cluster status
      debug:
        msg: |
          Cluster nodes:
          {{ kubectl_nodes.stdout }}
