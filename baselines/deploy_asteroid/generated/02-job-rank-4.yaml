---
# Kubernetes Job for baselines worker - Rank 4
# =====================================================
# Stage: 4
# Node: edinburgh
#
# Generated by: baselines/deploy_asteroid/generate_manifests.py
apiVersion: batch/v1
kind: Job
metadata:
  name: asteroid-rank-4
  namespace: default
  labels:
    app: baselines-asteroid
    component: worker
    stage: "4"
    rank: "4"
spec:
  # Retry failed pods up to 3 times
  backoffLimit: 3
  # Clean up completed jobs after 1 hour
  ttlSecondsAfterFinished: 3600
  # Only run one pod (no parallelism within job)
  parallelism: 1
  completions: 1

  template:
    metadata:
      labels:
        app: baselines-asteroid
        component: worker
        stage: "4"
        rank: "4"
      annotations:
        # Prometheus metrics scraping (if configured)
        prometheus.io/scrape: "false"
    spec:
      restartPolicy: OnFailure

      # =========================================
      # Node selection - pin to specific hardware
      # =========================================
      nodeSelector:
        kubernetes.io/hostname: edinburgh

      # Allow scheduling on GPU-tainted nodes
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/edge"
          operator: "Exists"
          effect: "NoSchedule"

      # =========================================
      # Init container - wait for master service
      # =========================================
      initContainers:
        - name: wait-for-master
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for asteroid-master service..."
              until nslookup asteroid-master.default.svc.cluster.local; do
                echo "Master not ready, waiting..."
                sleep 2
              done
              echo "Master service is ready!"
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "32Mi"

      # =========================================
      # Main container
      # =========================================
      containers:
        - name: baselines-worker
          image: 10.203.54.11:5000/asteroid:latest
          imagePullPolicy: Always

          # =========================================
          # Training command
          # =========================================
          command: ["python", "-m", "baselines.train"]
          args:
            - "--config"
            - "/workspace/baselines/configs/asteroid_default.yaml"
            - "--strategy"
            - "confident"
            - "--rank"
            - "4"
            - "--world-size"
            - "6"
            - "--cuda-id"
            - "0"
            - "--output-dir"
            - "/workspace/baselines_output"
          workingDir: /workspace

          # Resource requests and limits from profiled hardware
          resources:
            requests:
              memory: "45459Mi"
              cpu: "1000m"
              nvidia.com/gpu: "1"
            limits:
              memory: "68188Mi"
              cpu: "8000m"
              nvidia.com/gpu: "1"

          # =========================================
          # Environment variables for torch.distributed
          # =========================================
          env:
            # PyTorch distributed configuration
            - name: RANK
              value: "4"
            - name: WORLD_SIZE
              value: "6"
            - name: LOCAL_RANK
              value: "0"
            - name: MASTER_ADDR
              value: "asteroid-master.default.svc.cluster.local"
            - name: MASTER_PORT
              value: "29500"

            # NCCL configuration
            - name: NCCL_SOCKET_IFNAME
              value: "eth0"
            - name: NCCL_DEBUG
              value: "WARN"
            - name: NCCL_IB_DISABLE
              value: "1"
            - name: NCCL_P2P_DISABLE
              value: "1"
            - name: NCCL_SHM_DISABLE
              value: "0"

            # CUDA configuration
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: CUDA_LAUNCH_BLOCKING
              value: "0"

            # Baselines plan configuration
            - name: HPP_PLAN_PATH
              value: "/config/hpp_plan.json"
            - name: STAGE_IDX
              value: "4"
            - name: MICRO_BATCH_SIZE
              value: "4"

            # HuggingFace cache
            - name: HF_HOME
              value: "/cache/huggingface"
            - name: TRANSFORMERS_CACHE
              value: "/cache/huggingface/transformers"

            # Python configuration
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: TORCH_NCCL_BLOCKING_WAIT
              value: "1"
            # TensorBoard log directory (persistent on host)
            - name: TENSORBOARD_LOG_DIR
              value: "/tensorboard"

          # =========================================
          # Volume mounts
          # =========================================
          volumeMounts:
            # HPP plan from ConfigMap
            - name: config-volume
              mountPath: /config
              readOnly: true
            # Shared memory for NCCL
            - name: shm
              mountPath: /dev/shm
            # Cache for HuggingFace models/datasets
            - name: cache-volume
              mountPath: /cache
            # TensorBoard logs (persistent on host)
            - name: tensorboard-logs
              mountPath: /tensorboard
            # Checkpoints (persistent on host)
            - name: checkpoint-volume
              mountPath: /workspace/baselines_output/checkpoints

          # =========================================
          # Startup/liveness probes (optional)
          # =========================================
          # Note: Disabled by default as training jobs
          # may have long initialization periods
          # startupProbe:
          #   exec:
          #     command: ["python", "-c", "import torch"]
          #   initialDelaySeconds: 30
          #   periodSeconds: 10
          #   failureThreshold: 30

      # =========================================
      # Volumes
      # =========================================
      volumes:
        # ConfigMap with hpp_plan.json
        - name: config-volume
          configMap:
            name: asteroid-config

        # Shared memory - required for NCCL/PyTorch IPC
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "4Gi"

        # Cache volume (emptyDir or PVC)
        - name: cache-volume
          emptyDir:
            sizeLimit: "10Gi"
        # TensorBoard logs - hostPath persists across pod restarts
        - name: tensorboard-logs
          hostPath:
            path: /var/lib/baselines/tensorboard
            type: DirectoryOrCreate
        # Checkpoints - hostPath persists across pod restarts
        - name: checkpoint-volume
          hostPath:
            path: /var/lib/baselines/checkpoints/rank-4
            type: DirectoryOrCreate

      # DNS configuration for headless service resolution
      dnsPolicy: ClusterFirst
