---
# Kubernetes Job for baselines worker - Rank 7
# =====================================================
# Stage: 3
# Node: bangor2
#
# Generated by: baselines/deploy_asteroid/generate_manifests.py
apiVersion: batch/v1
kind: Job
metadata:
  name: asteroid-rank-7
  namespace: default
  labels:
    app: baselines-asteroid
    component: worker
    stage: "3"
    rank: "7"
spec:
  # Allow many restarts so a failed rank survives
  # long enough for peer watchdogs (300 s) to fire
  # and trigger a coordinated restart.
  backoffLimit: 50
  # Clean up completed jobs after 1 hour
  ttlSecondsAfterFinished: 3600
  # Only run one pod (no parallelism within job)
  parallelism: 1
  completions: 1

  template:
    metadata:
      labels:
        app: baselines-asteroid
        component: worker
        stage: "3"
        rank: "7"
      annotations:
        # Prometheus metrics scraping (if configured)
        prometheus.io/scrape: "false"
    spec:
      restartPolicy: OnFailure

      # =========================================
      # Host networking - bypass Flannel overlay
      # =========================================
      # Pods use the host's physical NIC (ens33) directly.
      # Eliminates veth→flannel→VXLAN encapsulation overhead
      # for NCCL/Gloo P2P and allreduce traffic.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      # =========================================
      # Node selection - pin to specific hardware
      # =========================================
      nodeSelector:
        kubernetes.io/hostname: bangor2

      # Allow scheduling on GPU-tainted nodes
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/edge"
          operator: "Exists"
          effect: "NoSchedule"

      # =========================================
      # Init container - wait for master service
      # =========================================
      initContainers:
        - name: wait-for-master
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for master (10.203.54.11:29500)..."
              until nc -z 10.203.54.11 29500 2>/dev/null; do
                echo "Master not ready, retrying..."
                sleep 2
              done
              echo "Master is reachable!"
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "32Mi"

      # =========================================
      # Main container
      # =========================================
      containers:
        - name: baselines-worker
          image: 10.203.54.11:5000/asteroid:latest
          imagePullPolicy: Always

          # =========================================
          # Training command
          # =========================================
          command: ["python", "-m", "baselines.train"]
          args:
            - "--config"
            - "/workspace/baselines/configs/asteroid_default.yaml"
            - "--strategy"
            - "asteroid"
            - "--rank"
            - "7"
            - "--world-size"
            - "8"
            - "--cuda-id"
            - "0"
            - "--output-dir"
            - "/workspace/baselines_output"
          workingDir: /workspace

          # Resource requests and limits from profiled hardware
          resources:
            requests:
              memory: "45459Mi"
              cpu: "1000m"
              nvidia.com/gpu: "1"
            limits:
              memory: "68188Mi"
              cpu: "8000m"
              nvidia.com/gpu: "1"

          # =========================================
          # Environment variables for torch.distributed
          # =========================================
          env:
            # PyTorch distributed configuration
            - name: RANK
              value: "7"
            - name: WORLD_SIZE
              value: "8"
            - name: LOCAL_RANK
              value: "0"
            - name: MASTER_ADDR
              value: "10.203.54.11"
            - name: MASTER_PORT
              value: "29500"

            # Gloo configuration (full-mesh peer connections)
            # With hostNetwork, use the physical NIC (ens33)
            - name: GLOO_SOCKET_IFNAME
              value: "ens33"

            # NCCL configuration — physical NIC for host networking
            - name: NCCL_SOCKET_IFNAME
              value: "ens33"
            - name: NCCL_DEBUG
              value: "INFO"
            - name: NCCL_IB_DISABLE
              value: "1"
            - name: NCCL_P2P_DISABLE
              value: "0"
            - name: NCCL_SHM_DISABLE
              value: "0"
            - name: NCCL_CONNECT_RETRIES
              value: "10"

            # NCCL socket tuning for TCP throughput
            - name: NCCL_NSOCKS_PERTHREAD
              value: "4"
            - name: NCCL_SOCKET_NTHREADS
              value: "4"
            - name: NCCL_BUFFSIZE
              value: "8388608"
            - name: NCCL_NET_GDR_LEVEL
              value: "0"

            # CUDA configuration
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: CUDA_LAUNCH_BLOCKING
              value: "0"
            - name: CUBLAS_WORKSPACE_CONFIG
              value: ":4096:8"

            # Baselines plan configuration
            - name: HPP_PLAN_PATH
              value: "/config/hpp_plan.json"
            - name: STAGE_IDX
              value: "3"
            - name: MICRO_BATCH_SIZE
              value: "1"

            # HuggingFace cache
            - name: HF_HOME
              value: "/cache/huggingface"
            - name: TRANSFORMERS_CACHE
              value: "/cache/huggingface/transformers"

            # MPS configuration (GPU sharing via NVIDIA MPS)
            - name: CUDA_MPS_PIPE_DIRECTORY
              value: "/tmp/nvidia-mps"

            # Python configuration
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: TORCH_NCCL_BLOCKING_WAIT
              value: "1"

            # Experiment metrics collection
            - name: ASTEROID_METRICS
              value: "1"
            - name: ASTEROID_METRICS_DIR
              value: "/tmp/asteroid_metrics"

            # TensorBoard log directory (persistent on host)
            - name: TENSORBOARD_LOG_DIR
              value: "/tensorboard"

          # =========================================
          # Volume mounts
          # =========================================
          volumeMounts:
            # HPP plan from ConfigMap
            - name: config-volume
              mountPath: /config
              readOnly: true
            # Shared memory for NCCL
            - name: shm
              mountPath: /dev/shm
            # Cache for HuggingFace models/datasets
            - name: cache-volume
              mountPath: /cache
            # TensorBoard logs (persistent on host)
            - name: tensorboard-logs
              mountPath: /tensorboard
            # Checkpoints (persistent on host)
            - name: checkpoint-volume
              mountPath: /workspace/baselines_output/checkpoints
            # NVIDIA MPS pipe directory (GPU sharing)
            - name: nvidia-mps
              mountPath: /tmp/nvidia-mps
            # Experiment metrics directory (JSONL output)
            - name: metrics-volume
              mountPath: /tmp/asteroid_metrics

          # =========================================
          # Startup/liveness probes (optional)
          # =========================================
          # Note: Disabled by default as training jobs
          # may have long initialization periods
          # startupProbe:
          #   exec:
          #     command: ["python", "-c", "import torch"]
          #   initialDelaySeconds: 30
          #   periodSeconds: 10
          #   failureThreshold: 30

      # =========================================
      # Volumes
      # =========================================
      volumes:
        # ConfigMap with hpp_plan.json
        - name: config-volume
          configMap:
            name: asteroid-config

        # Shared memory - required for NCCL/PyTorch IPC
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "4Gi"

        # Cache volume (emptyDir or PVC)
        - name: cache-volume
          emptyDir:
            sizeLimit: "10Gi"
        # TensorBoard logs - hostPath persists across pod restarts
        - name: tensorboard-logs
          hostPath:
            path: /var/lib/baselines/tensorboard
            type: DirectoryOrCreate
        # Checkpoints - hostPath persists across pod restarts
        - name: checkpoint-volume
          hostPath:
            path: /var/lib/baselines/checkpoints/rank-7
            type: DirectoryOrCreate
        # NVIDIA MPS control pipe (host daemon socket)
        - name: nvidia-mps
          hostPath:
            path: /tmp/nvidia-mps
            type: Directory
        # Experiment metrics (JSONL files persisted on host)
        - name: metrics-volume
          hostPath:
            path: /tmp/asteroid_metrics
            type: DirectoryOrCreate

      # DNS policy is set above (ClusterFirstWithHostNet)
      # to ensure K8s DNS still works with hostNetwork: true
