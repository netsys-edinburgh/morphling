---
# ============================================================================
# Baselines Asteroid Profiling and Data Gathering Playbook
# ============================================================================
# Syncs codebase to all nodes, executes profile_node.py, and gathers results.
#
# Usage:
#   ansible-playbook profile_and_gather.yaml -v
#
# Prerequisites:
#   - Run bootstrap_nodes.yaml first to set up environments
#
# Output:
#   - Profile JSON files gathered to ./profiles/ directory

- name: Baselines Asteroid Cluster Profiling and Data Sync
  hosts: cluster
  gather_facts: true
  vars_files:
    - secrets.yml
  vars:
    # Paths
    baselines_local_src: "{{ playbook_dir }}/../.."
    baselines_remote_src: /opt/baselines/src
    baselines_remote_profiles: /opt/baselines/profiles
    profiles_local_dir: "{{ playbook_dir }}/../profiles"
    venv_python: /opt/baselines/venv/bin/python

    # Temp bundle paths (no rsync needed)
    local_bundle_path: /tmp/baselines_src.tar.gz
    remote_bundle_path: /tmp/baselines_src.tar.gz

    # HuggingFace cache
    hf_cache_local: "{{ lookup('env', 'HOME') }}/.cache/huggingface"
    hf_cache_remote: /opt/baselines/.cache/huggingface
    hf_bundle_local: /tmp/baselines_hf_cache.tar.gz
    hf_bundle_remote: /tmp/baselines_hf_cache.tar.gz

    # Profiling configuration
    # Must match actual model dimensions for accurate timing.
    # LLaMA-7B: num_layers=32, embed_dim=4096, d_ff=11008
    profile_num_layers: 32
    profile_embed_dim: 4096
    profile_num_heads: 32
    profile_d_ff: 11008
    profile_batch_sizes: "1,2,4"
    profile_seq_len: 512

    # Build peer list dynamically from inventory (exclude self)
    # Use hostvars[h].ansible_host with a safe default per host
    network_peers: >-
      {% set peers = [] -%}
      {% for h in groups['cluster'] -%}
        {% set peer_ip = hostvars[h].get('ansible_host', h) -%}
        {% if peer_ip != (ansible_host | default(inventory_hostname))
           and h != inventory_hostname -%}
          {% if peers.append(peer_ip ~ ':5201') %}{% endif -%}
        {% endif -%}
      {% endfor -%}
      {{ peers | join(',') }}

  tasks:
    # =========================================================================
    # PHASE 1: Sync Codebase to All Nodes (no rsync - password compatible)
    # =========================================================================
    - name: "SYNC | Create source directory"
      ansible.builtin.file:
        path: "{{ baselines_remote_src }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user }}"
      become: true

    - name: "SYNC | Create source bundle on control node"
      ansible.builtin.shell: |
        cd "{{ baselines_local_src }}" && \
        tar --exclude='.git' \
            --exclude='.venv' \
            --exclude='.venv_asteroid' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='baselines/profiles' \
            --exclude='baselines/deploy_asteroid/generated' \
            --exclude='*.egg-info' \
            --exclude='hpp_plan.json' \
            --exclude='*.pt' \
            --exclude='*.tar.gz' \
            --exclude='*.log' \
            --exclude='my_checkpoints*' \
            --exclude='final_model' \
            --exclude='checkpoints_collected' \
            --exclude='tb_logs' \
            --exclude='baselines_output' \
            --exclude='node_modules' \
            -czf "{{ local_bundle_path }}" .
      delegate_to: localhost
      become: false
      run_once: true

    - name: "SYNC | Upload source bundle to nodes"
      ansible.builtin.copy:
        src: "{{ local_bundle_path }}"
        dest: "{{ remote_bundle_path }}"
        mode: '0644'

    - name: "SYNC | Extract source bundle on nodes"
      ansible.builtin.shell: |
        rm -rf "{{ baselines_remote_src }}"/* && \
        tar -xzf "{{ remote_bundle_path }}" -C "{{ baselines_remote_src }}"
      become: true

    - name: "SYNC | Fix source ownership"
      ansible.builtin.file:
        path: "{{ baselines_remote_src }}"
        state: directory
        recurse: yes
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
      become: true

    - name: "SYNC | Cleanup remote bundle"
      ansible.builtin.file:
        path: "{{ remote_bundle_path }}"
        state: absent

    - name: "SYNC | Cleanup local bundle"
      ansible.builtin.file:
        path: "{{ local_bundle_path }}"
        state: absent
      delegate_to: localhost
      become: false
      run_once: true

    - name: "INSTALL | Fix conflicting nvidia apt sources"
      ansible.builtin.shell:
        cmd: |
          f=/etc/apt/sources.list.d/nvidia-container-toolkit.list
          if [ -f "$f" ] && grep -qv 'signed-by' "$f"; then
            grep 'signed-by' "$f" > "${f}.tmp" && mv "${f}.tmp" "$f"
          fi
          curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
            | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg --yes 2>/dev/null || true
      become: true
      changed_when: false

    - name: "INSTALL | Ensure python3-venv is installed"
      ansible.builtin.apt:
        name:
          - python3-venv
          - python3-pip
        state: present
      become: true

    - name: "INSTALL | Create venv if not exists"
      ansible.builtin.command:
        cmd: python3 -m venv /opt/baselines/venv
        creates: /opt/baselines/venv/bin/python
      become: true

    - name: "INSTALL | Free disk space (apt & pip caches, temp files)"
      ansible.builtin.shell: |
        apt-get clean -y 2>/dev/null || true
        rm -rf /var/lib/apt/lists/* 2>/dev/null || true
        rm -rf /tmp/pip-* /tmp/pip_* 2>/dev/null || true
        /opt/baselines/venv/bin/pip cache purge 2>/dev/null || true
      become: true
      changed_when: true

    - name: "INSTALL | Check available disk space"
      ansible.builtin.shell: |
        df -BG --output=avail /opt 2>/dev/null | tail -1 | tr -d ' G'
      register: disk_space_check
      changed_when: false

    - name: "INSTALL | Warn if disk space is low (< 10 GB)"
      ansible.builtin.debug:
        msg: "WARNING: Only {{ disk_space_check.stdout }}GB available on /opt. PyTorch+CUDA needs ~5GB. Install may fail."
      when: disk_space_check.stdout | int < 10

    - name: "INSTALL | Upgrade pip and install build tools"
      ansible.builtin.shell: |
        /opt/baselines/venv/bin/pip install --no-cache-dir --upgrade pip setuptools wheel
      become: true

    - name: "INSTALL | Install baselines requirements"
      ansible.builtin.shell: |
        set -e
        PIP=/opt/baselines/venv/bin/pip
        # Try the dedicated deploy requirements first (most complete)
        if [ -f "{{ baselines_remote_src }}/baselines/requirements-deploy.txt" ]; then
          $PIP install --no-cache-dir -r "{{ baselines_remote_src }}/baselines/requirements-deploy.txt"
        elif [ -f "{{ baselines_remote_src }}/requirements-deploy.txt" ]; then
          $PIP install --no-cache-dir -r "{{ baselines_remote_src }}/requirements-deploy.txt"
        else
          # Absolute fallback — install core deps manually
          $PIP install --no-cache-dir torch torchvision torchaudio numpy \
            pydantic pydantic-settings pyyaml tensorboard tqdm \
            python-dotenv datasets transformers jinja2 scipy safetensors
        fi
      become: true
      register: pip_install_result
      ignore_errors: true

    - name: "INSTALL | Show pip install result"
      ansible.builtin.debug:
        var: pip_install_result
      when: pip_install_result is defined

    # =========================================================================
    # PHASE 2: Sync HuggingFace Dataset Cache (no rsync - password compatible)
    # =========================================================================
    - name: "CACHE | Check if HF cache exists on control node"
      ansible.builtin.stat:
        path: "{{ hf_cache_local }}/datasets"
      register: hf_cache_check
      delegate_to: localhost
      run_once: true

    - name: "CACHE | Create HF cache directory"
      ansible.builtin.file:
        path: "{{ hf_cache_remote }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user }}"
      become: true

    - name: "CACHE | Create HF cache bundle on control node"
      ansible.builtin.shell: |
        cd "{{ hf_cache_local }}" && \
        tar --exclude='*.lock' -czf "{{ hf_bundle_local }}" .
      delegate_to: localhost
      become: false
      run_once: true
      when: hf_cache_check.stat.exists
      ignore_errors: true

    - name: "CACHE | Upload HF cache bundle to nodes"
      ansible.builtin.copy:
        src: "{{ hf_bundle_local }}"
        dest: "{{ hf_bundle_remote }}"
        mode: '0644'
      when: hf_cache_check.stat.exists
      ignore_errors: true

    - name: "CACHE | Extract HF cache on nodes"
      ansible.builtin.shell: |
        tar -xzf "{{ hf_bundle_remote }}" -C "{{ hf_cache_remote }}"
      become: true
      when: hf_cache_check.stat.exists
      ignore_errors: true

    - name: "CACHE | Cleanup HF bundles"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ hf_bundle_remote }}"
      when: hf_cache_check.stat.exists
      ignore_errors: true

    - name: "CACHE | Cleanup local HF bundle"
      ansible.builtin.file:
        path: "{{ hf_bundle_local }}"
        state: absent
      delegate_to: localhost
      become: false
      run_once: true
      when: hf_cache_check.stat.exists
      ignore_errors: true

    # =========================================================================
    # PHASE 3: Setup iperf3 Servers for Network Profiling
    # =========================================================================
    - name: "IPERF | Install iperf3 and virtualenv"
      ansible.builtin.apt:
        name:
          - iperf3
          - python3-venv
          - python3-pip
        state: present
        update_cache: yes
      become: true

    - name: "IPERF | Copy systemd service file"
      copy:
        src: files/iperf_server.service
        dest: /etc/systemd/system/iperf_server.service
        mode: '0644'
      become: true

    - name: "IPERF | Reload systemd daemon"
      systemd:
        daemon_reload: yes
      become: true

    - name: "IPERF | Stop any existing iperf3 service"
      systemd:
        name: iperf_server
        state: stopped
      become: true
      ignore_errors: true

    - name: "IPERF | Start iperf3 server"
      systemd:
        name: iperf_server
        state: started
        enabled: no
      become: true

    - name: "IPERF | Wait for iperf3 to be ready"
      wait_for:
        port: 5201
        timeout: 30
        state: started

    # =========================================================================
    # PHASE 4: Execute GPU Profiler (parallel across all nodes)
    # =========================================================================
    - name: "PROFILE | Create profiles directory"
      file:
        path: "{{ baselines_remote_profiles }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user }}"
      become: true

    - name: "PROFILE | Run GPU profiling (--skip-network)"
      command: >
        {{ venv_python }} {{ baselines_remote_src }}/baselines/scripts/profile_node.py
        --output-dir {{ baselines_remote_profiles }}
        --rank {{ rank | default(ansible_play_hosts_all.index(inventory_hostname)) }}
        --num-layers {{ profile_num_layers }}
        --embed-dim {{ profile_embed_dim }}
        --num-heads {{ profile_num_heads }}
        --d-ff {{ profile_d_ff }}
        --batch-sizes "{{ profile_batch_sizes }}"
        --seq-len {{ profile_seq_len }}
        --network-peers "{{ network_peers }}"
        --skip-network
      environment:
        HF_HOME: "{{ hf_cache_remote }}"
        CUDA_VISIBLE_DEVICES: "{{ gpu_id | default('0') }}"
      register: profile_result
      become: true
      become_user: "{{ ansible_user }}"

    - name: "PROFILE | Display GPU profiling output"
      debug:
        msg: "{{ profile_result.stdout_lines[-20:] }}"
      when: profile_result.stdout_lines | length > 0

# =============================================================================
# PLAY 2: Network (iperf) profiling — serialized one node at a time
# =============================================================================
# iperf3 server only handles one client at a time.  Running all nodes in
# parallel causes "the server is busy" errors on 75%+ of links.
# serial: 1 ensures each node completes its iperf tests before the next starts.
- name: Serialized Network Profiling (iperf3)
  hosts: cluster
  serial: 1
  gather_facts: false
  vars_files:
    - secrets.yml
  vars:
    baselines_remote_src: /opt/baselines/src
    baselines_remote_profiles: /opt/baselines/profiles
    venv_python: /opt/baselines/venv/bin/python
    network_peers: >-
      {% set peers = [] -%}
      {% for h in groups['cluster'] -%}
        {% set peer_ip = hostvars[h].get('ansible_host', h) -%}
        {% if peer_ip != (ansible_host | default(inventory_hostname))
           and h != inventory_hostname -%}
          {% if peers.append(peer_ip ~ ':5201') %}{% endif -%}
        {% endif -%}
      {% endfor -%}
      {{ peers | join(',') }}

  tasks:
    - name: "NETWORK | Run iperf profiling (--network-only)"
      command: >
        {{ venv_python }} {{ baselines_remote_src }}/baselines/scripts/profile_node.py
        --output-dir {{ baselines_remote_profiles }}
        --rank {{ rank | default(groups['cluster'].index(inventory_hostname)) }}
        --network-peers "{{ network_peers }}"
        --network-only
      register: net_result
      become: true
      become_user: "{{ ansible_user }}"

    - name: "NETWORK | Display network profiling output"
      debug:
        msg: "{{ net_result.stdout_lines[-10:] }}"
      when: net_result.stdout_lines | length > 0

# =============================================================================
# PLAY 3: Gather profiles and cleanup
# =============================================================================
- name: Gather Profiles and Cleanup
  hosts: cluster
  gather_facts: false
  vars_files:
    - secrets.yml
  vars:
    baselines_remote_profiles: /opt/baselines/profiles
    profiles_local_dir: "{{ playbook_dir }}/../profiles"

  tasks:
    - name: "GATHER | Ensure local profiles directory exists"
      file:
        path: "{{ profiles_local_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: "GATHER | Find profile files"
      find:
        paths: "{{ baselines_remote_profiles }}"
        patterns: "profile_*.json"
      register: profile_files

    - name: "GATHER | Fetch profile JSON to control node"
      fetch:
        src: "{{ item.path }}"
        dest: "{{ profiles_local_dir }}/"
        flat: yes
      loop: "{{ profile_files.files }}"
      when: profile_files.matched > 0

    # =========================================================================
    # PHASE 6: Cleanup
    # =========================================================================
    - name: "CLEANUP | Stop iperf3 server"
      systemd:
        name: iperf_server
        state: stopped
      become: true
      ignore_errors: true

    # =========================================================================
    # Summary
    # =========================================================================
    - name: "SUMMARY | List gathered profiles"
      find:
        paths: "{{ profiles_local_dir }}"
        patterns: "profile_*.json"
      register: gathered_profiles
      delegate_to: localhost
      run_once: true

    - name: "SUMMARY | Display results"
      debug:
        msg: |
          ========================================
          PROFILING COMPLETE
          ========================================
          Profiles gathered: {{ gathered_profiles.matched }}
          Location: {{ profiles_local_dir }}
          Files: {{ gathered_profiles.files | map(attribute='path') | map('basename') | list }}
          ========================================
      run_once: true
