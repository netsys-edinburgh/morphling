# =============================================================================
# Asteroid — Unified Configuration
# =============================================================================
# Single source of truth for the entire Asteroid distributed-training system.
# Consumed by: worker.py, run_planner.py, deploy.sh, generate_manifests.py.
#
# Sections:
#   model           — Transformer architecture and task head
#   training        — Optimization, batching, and loop hyperparameters
#   parallelism     — Strategy selection, schedule, and communication
#   fault_tolerance — Unified FT policy (same for all strategies)
#   cluster         — Physical node inventory (replaces cluster.conf)
#   mps             — NVIDIA Multi-Process Service (optional GPU sharing)
#   deploy          — Docker image, K8s, and Ansible settings
# =============================================================================

# ── Model ────────────────────────────────────────────────────────────────────
model:
  model_name: llama2-7b
  model_type: llama              # gpt2 | llama | encoder
  task_type: lm                  # classification | lm
  num_layers: 32
  embedding_dim: 4096
  num_heads: 32
  n_kv_heads: 32                 # GQA key/value heads (0 = MHA, i.e. n_kv_heads == num_heads)
  d_ff: 11008
  max_seq_len: 512
  vocab_size: 50257              # GPT-2 tokenizer vocab (training from scratch)
  num_classes: 2
  dropout: 0.0
  use_flash_attention: true
  hf_model_name: ""             # if non-empty, use HFModelAdapter (e.g. "meta-llama/Llama-2-7b")

# ── Training ─────────────────────────────────────────────────────────────────
training:
  global_batch_size: 32
  micro_batch_size: 2
  lr: 3.0e-4
  min_lr: 1.0e-5
  weight_decay: 0.01
  max_iters: 500
  warmup_iters: 50
  grad_clip: 1.0
  eval_interval: 100
  log_interval: 10
  seed: 42
  dataset: sst2

# ── Parallelism ──────────────────────────────────────────────────────────────
parallelism:
  strategy: confident            # asteroid | confident | dtfm
  schedule_type: "1f1b"                 # gpipe | 1f1b  (auto-set by strategy if empty)
  num_stages: 2                     # pipeline stages per pipeline (pp_size); dp_size = world_size / num_stages
  world_size: 6
  comm_backend: torch_dist      # torch_dist | nccl | gloo
  dist_url: "tcp://127.0.0.1:29600"
  d2d_bandwidth_mbps: 100.0

# ── Fault Tolerance (unified — applied to ALL strategies) ────────────────────
fault_tolerance:
  heartbeat_interval_s: 2.0
  heartbeat_timeout_s: 8.0
  backward_timeout_ms: 30000.0
  replication_mode: all         # all | topology | local | global | none
  replication_interval: 25
  ft_check_interval: 5
  checkpoint_strategy: async    # async | sync
  checkpoint_dir: ./checkpoints
  checkpoint_interval: 100

# ── Cluster (replaces cluster.conf) ──────────────────────────────────────────
cluster:
  nodes:
    - ip: 10.203.54.11
      hostname: host
      nic: ens33
      gpu_id: 0
      memory_mb: 46068
      rank: 0
      role: master
      mps:                          # per-node GPU constraint
        active_thread_percentage: 100   # full compute
        memory_limit_mb: 40960          # ~40 GB usable

    - ip: 10.203.54.10
      hostname: worker2
      nic: ens33
      gpu_id: 0
      memory_mb: 46068
      rank: 1
      mps:
        active_thread_percentage: 90   # fast — paired with rank 0
        memory_limit_mb: 40960          # ~40 GB

    - ip: 10.203.53.10
      hostname: worker1
      nic: ens33
      gpu_id: 0
      memory_mb: 46068
      rank: 2
      mps:
        active_thread_percentage: 60    # slow — paired with rank 3
        memory_limit_mb: 24576          # ~24 GB

    - ip: 10.203.56.10
      hostname: worker3
      nic: ens33
      gpu_id: 0
      memory_mb: 46068
      rank: 3
      mps:
        active_thread_percentage: 50    # slow — paired with rank 2
        memory_limit_mb: 24576          # ~24 GB

    - ip: 10.203.56.12
