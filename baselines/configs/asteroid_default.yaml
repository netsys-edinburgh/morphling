# ── MPS (NVIDIA Multi-Process Service) — global defaults ────────────────────
mps:
  enabled: false
  active_thread_percentage: 100   # overridden per-node above
  pipe_directory: ""              # default: /tmp/nvidia-mps-<gpu_id>
  log_directory: ""               # default: /tmp/nvidia-log-<gpu_id>
  pinned_device_mem_limit: ""

# ── Deploy ───────────────────────────────────────────────────────────────────
deploy:
  image_name: asteroid
  image_tag: latest
  kubeconfig: ~/.kube/config
  namespace: default
  master_port: 29500
  nccl_debug: WARN
  nccl_ib_disable: "1"
  nccl_p2p_disable: "1"
  shm_size: 4Gi
  output_dir: ./asteroid_output
