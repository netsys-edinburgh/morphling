services:
  redis:
    image: redis:7-alpine
    container_name: morphling-redis
    # 不暴露6379端口，避免与本地redis冲突
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  device-emulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: morphling-emulator
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "443:443"
      - "39000:39000"
      - "28516:28516"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config
      # 挂载源码目录用于开发
      - ./csrc:/app/csrc
      - ./morphling:/app/morphling
      - ./scripts:/app/scripts
      - ./proto:/app/proto
      - ./op_builder:/app/op_builder
      - ./examples:/app/examples
      - ./pyproject.toml:/app/pyproject.toml
      - ./setup.py:/app/setup.py
      - ./CMakeLists.txt:/app/CMakeLists.txt
      - ./requirements.txt:/app/requirements.txt
      # 挂载构建目录，避免重复构建
      - morphling_build:/app/build
    environment:
      - SPDLOG_LEVEL=debug
      - CUDA_VISIBLE_DEVICES=0
      - MORPHLING_DEV_MODE=1  # 开发模式标志
    shm_size: 8g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # 使用入口点脚本
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    # 保持容器运行
    command: ["tail", "-f", "/dev/null"]
    
    # 可选：直接启动设备模拟器
    # command: ["morphling_emulator", "--num_devices", "4", "--model_name", "facebook/opt-125m"]

  # 可选：Nginx代理服务
  nginx-proxy:
    image: nginx:alpine
    container_name: morphling-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker-nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker-nginx/morphling_stream.conf:/etc/nginx/stream_conf.d/morphling_stream.conf:ro
    depends_on:
      - device-emulator
    profiles:
      - proxy  # 使用profiles来可选启动

volumes:
  redis_data:
  morphling_build:  # 用于缓存构建结果

networks:
  default:
    name: morphling-network